<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" role="img" aria-label="Kiwi feather icon">
	<defs>
		<linearGradient id="featherGrad" x1="85" y1="20" x2="430" y2="240" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#1a6b5c" />
			<stop offset="0.55" stop-color="#1f7f6a" />
			<stop offset="1" stop-color="#b8952e" />
		</linearGradient>
		<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#12151c" flood-opacity="0.12" />
		</filter>
	</defs>

	<!-- Feather silhouette -->
	<path
		filter="url(#softShadow)"
		fill="url(#featherGrad)"
		opacity="0.98"
		d="M258 238
		   C180 226 88 192 72 114
		   C58 46 128 20 196 48
		   C244 68 292 90 330 92
		   C396 95 442 126 430 175
		   C417 228 330 257 258 238 Z"
	/>

	<!-- Central quill -->
	<path
		d="M264 236
		   C242 198 242 160 240 120
		   C239 89 230 62 214 40"
		fill="none"
		stroke="#ffffff"
		stroke-opacity="0.65"
		stroke-width="6"
		stroke-linecap="round"
	/>

	<!-- Barbs (stylized) -->
	<g fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="5" stroke-linecap="round">
		<path d="M238 202 L156 176" />
		<path d="M242 186 L170 152" />
		<path d="M248 170 L190 126" />
		<path d="M256 156 L210 112" />
		<path d="M268 144 L262 84" />
		<path d="M279 166 L326 140" />
		<path d="M285 186 L348 160" />
		<path d="M292 204 L360 190" />
	</g>

	<!-- Subtle highlight stripe -->
	<path
		d="M262 235
		   C208 215 142 186 118 142
		   C94 98 118 64 155 54"
		fill="none"
		stroke="#ffffff"
		stroke-opacity="0.28"
		stroke-width="7"
		stroke-linecap="round"
	/>
</svg>

