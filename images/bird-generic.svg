<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 320" role="img" aria-label="Bird icon">
	<defs>
		<linearGradient id="gBird" x1="70" y1="20" x2="445" y2="300" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#1a6b5c" />
			<stop offset="1" stop-color="#1f7f6a" />
		</linearGradient>
		<filter id="gShadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#12151c" flood-opacity="0.12" />
		</filter>
	</defs>

	<!-- Simple generic bird silhouette -->
	<path
		filter="url(#gShadow)"
		fill="url(#gBird)"
		opacity="0.98"
		d="M290 58
		   C240 52 186 88 172 138
		   C156 196 182 246 236 268
		   C280 286 330 275 366 245
		   C406 212 426 154 404 108
		   C392 84 352 62 290 58 Z"
	/>

	<!-- Wing hint -->
	<path d="M192 160 C230 140 270 138 318 152" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round"/>

	<!-- Beak -->
	<path d="M360 145 C388 130 415 140 423 165 C431 188 410 206 386 200" fill="none" stroke="#b8952e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

	<!-- Eye -->
	<circle cx="308" cy="124" r="9" fill="#ffffff" fill-opacity="0.7" />
</svg>

